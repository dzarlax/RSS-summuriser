<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админка{% endblock %} — Evening News</title>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/admin.css" rel="stylesheet">
    <script src="/static/js/main.js" defer></script>
    {% block extra_css %}{% endblock %}
</head>
<body class="admin-body">
<div class="admin-shell">

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="admin-sidenav">
        <a href="/admin" class="sidenav-brand">
            <span class="brand-icon">📰</span>
            <span class="brand-text">
                Evening News
                <span class="brand-sub">Admin</span>
            </span>
        </a>

        <nav class="sidenav-nav">
            <a href="/admin" class="sidenav-link {% if active_menu == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">📊</span>
                <span>Дашборд</span>
            </a>
            <a href="/admin/sources" class="sidenav-link {% if active_menu == 'sources' %}active{% endif %}">
                <span class="nav-icon">📰</span>
                <span>Источники</span>
            </a>
            <a href="/admin/categories" class="sidenav-link {% if active_menu == 'categories' %}active{% endif %}">
                <span class="nav-icon">🏷️</span>
                <span>Категории</span>
            </a>
            <a href="/admin/stats" class="sidenav-link {% if active_menu == 'stats' %}active{% endif %}">
                <span class="nav-icon">📈</span>
                <span>Статистика</span>
            </a>
            <a href="/admin/settings" class="sidenav-link {% if active_menu == 'settings' %}active{% endif %}">
                <span class="nav-icon">&#9881;&#65039;</span>
                <span>Настройки</span>
            </a>
        </nav>

        <div class="sidenav-bottom">
            <a href="/" target="_blank" class="sidenav-link muted">
                <span class="nav-icon">↗</span>
                <span>На сайт</span>
            </a>
        </div>
    </aside>

    <!-- ==================== CONTENT ==================== -->
    <div class="admin-content-wrap">
        <div class="admin-main">
            {% block content %}{% endblock %}
        </div>
    </div>

</div>
{% block extra_js %}{% endblock %}
</body>
</html>
