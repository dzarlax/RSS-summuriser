{% extends "admin/admin_base.html" %}

{% block title %}Дневные сводки - Evening News v2{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h1 style="margin:0;">Сводки</h1>
    <div style="display:flex;gap:8px;align-items:center;">
        <select id="category-filter" class="sum-select" onchange="loadSummaries()">
            <option value="">Все категории</option>
        </select>
        <input type="date" id="date-filter" class="sum-select" onchange="loadSummaries()">
    </div>
</div>

<div id="summaries-container">
    <div style="text-align:center;padding:3rem;color:var(--text-muted);">Загрузка...</div>
</div>

<div id="load-more" style="display:none;text-align:center;padding:1rem;">
    <button class="btn btn-secondary" onclick="loadMore()">Загрузить ещё</button>
</div>

<style>
.sum-select { padding:6px 10px; border:1px solid var(--border,#ddd); border-radius:5px; font-size:.85rem; background:var(--surface,#fff); color:var(--text-color); }
.sum-date-group { margin-bottom:1.5rem; }
.sum-date-header { font-size:.85rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; padding-bottom:.4rem; border-bottom:1px solid var(--border,#e1e5e9); margin-bottom:.75rem; }
.sum-card { background:var(--surface,#fff); border:1px solid var(--border,#e1e5e9); border-radius:8px; margin-bottom:8px; overflow:hidden; }
.sum-card-header { display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem; cursor:pointer; user-select:none; }
.sum-card-header:hover { background:var(--surface-hover,#f8f9fa); }
.sum-card-arrow { font-size:.7rem; color:var(--text-muted); transition:transform .2s; flex-shrink:0; }
.sum-card.open .sum-card-arrow { transform:rotate(90deg); }
.sum-cat-badge { font-size:.7rem; font-weight:600; padding:2px 8px; border-radius:10px; color:#fff; flex-shrink:0; }
.sum-card-title { flex:1; font-size:.9rem; font-weight:500; color:var(--text-color); }
.sum-card-meta { font-size:.75rem; color:var(--text-muted); white-space:nowrap; }
.sum-card-body { display:none; padding:0 1rem 1rem; }
.sum-card.open .sum-card-body { display:block; }
.sum-card-text { font-size:.9rem; line-height:1.65; color:var(--text-color); white-space:pre-wrap; word-wrap:break-word; }
.sum-card-actions { display:flex; gap:.5rem; margin-top:.75rem; }
.sum-copy-btn { padding:4px 10px; border:1px solid var(--border,#ddd); border-radius:5px; background:var(--surface,#fff); color:var(--text-muted); font-size:.75rem; cursor:pointer; }
.sum-copy-btn:hover { background:var(--surface-hover,#f8f9fa); }
</style>

<script>
let offset = 0;
let allSummaries = [];
const catColors = {};

document.addEventListener('DOMContentLoaded', async () => {
    await loadCategories();
    await loadSummaries();
});

async function loadCategories() {
    try {
        const r = await fetch('/api/v1/summaries/categories');
        if (!r.ok) return;
        const data = await r.json();
        const sel = document.getElementById('category-filter');
        (data.categories || []).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.category;
            opt.textContent = `${c.category} (${c.summaries_count})`;
            sel.appendChild(opt);
        });

        // Also load category colors
        try {
            const cr = await fetch('/api/v1/categories/');
            if (cr.ok) {
                const cd = await cr.json();
                (cd.categories || []).forEach(c => { catColors[c.category || c.name] = c.color; });
            }
        } catch(e) {}
    } catch(e) { console.error('loadCategories:', e); }
}

async function loadSummaries(reset = true) {
    if (reset) { offset = 0; allSummaries = []; }
    const cat = document.getElementById('category-filter').value;
    const date = document.getElementById('date-filter').value;
    let url = `/api/v1/summaries/daily?limit=30&offset=${offset}`;
    if (cat) url += `&category=${encodeURIComponent(cat)}`;
    if (date) url += `&date=${date}`;

    try {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const items = data.summaries || [];
        allSummaries = reset ? items : allSummaries.concat(items);
        render();
        document.getElementById('load-more').style.display = items.length >= 30 ? '' : 'none';
        offset += items.length;
    } catch(e) {
        document.getElementById('summaries-container').innerHTML =
            `<div style="text-align:center;padding:3rem;color:var(--error-color);">Ошибка: ${e.message}</div>`;
    }
}

function loadMore() { loadSummaries(false); }

function render() {
    const container = document.getElementById('summaries-container');
    if (!allSummaries.length) {
        container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted);">Сводки не найдены</div>';
        return;
    }

    // Group by date
    const groups = {};
    allSummaries.forEach(s => {
        const d = s.date ? s.date.split('T')[0] : 'unknown';
        if (!groups[d]) groups[d] = [];
        groups[d].push(s);
    });

    // Sort dates descending
    const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    container.innerHTML = sortedDates.map(date => {
        const dateLabel = formatDate(date);
        const cards = groups[date].map(s => {
            const color = catColors[s.category] || '#6c757d';
            const preview = s.summary_text.length > 120 ? s.summary_text.substring(0, 120) + '...' : s.summary_text;
            return `
            <div class="sum-card" id="sum-${s.id}">
                <div class="sum-card-header" onclick="toggleCard(${s.id})">
                    <span class="sum-card-arrow">&#9654;</span>
                    <span class="sum-cat-badge" style="background:${color};">${esc(s.category)}</span>
                    <span class="sum-card-title">${esc(preview)}</span>
                    <span class="sum-card-meta">${s.articles_count} ст.</span>
                </div>
                <div class="sum-card-body">
                    <div class="sum-card-text">${esc(s.summary_text)}</div>
                    <div class="sum-card-actions">
                        <button class="sum-copy-btn" onclick="copyText(${s.id}, this)">Копировать</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        return `<div class="sum-date-group"><div class="sum-date-header">${dateLabel}</div>${cards}</div>`;
    }).join('');
}

function toggleCard(id) {
    const card = document.getElementById('sum-' + id);
    if (card) card.classList.toggle('open');
}

async function copyText(id, btn) {
    const s = allSummaries.find(x => x.id === id);
    if (!s) return;
    try {
        await navigator.clipboard.writeText(s.summary_text);
        btn.textContent = 'Скопировано';
        setTimeout(() => btn.textContent = 'Копировать', 2000);
    } catch(e) { btn.textContent = 'Ошибка'; setTimeout(() => btn.textContent = 'Копировать', 2000); }
}

function formatDate(dateStr) {
    try {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch(e) { return dateStr; }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
{% endblock %}
