{% extends "admin/admin_base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>Категории</h1>

<!-- Alert container -->
<div id="alert-container"></div>

<!-- Categories grid -->
<div class="cat-grid" id="categories-grid">
    <div style="color:var(--text-muted);padding:2rem;text-align:center;">Загрузка...</div>
</div>

<!-- Add category -->
<div class="cat-add-section">
    <h3>Добавить категорию</h3>
    <form id="add-category-form" class="cat-add-form">
        <input type="text" id="new-cat-name" placeholder="Системное имя (EN)" class="cat-input" required>
        <input type="text" id="new-cat-display" placeholder="Отображаемое имя" class="cat-input" required>
        <input type="color" id="new-cat-color" value="#6c757d" class="cat-color-input">
        <button type="submit" class="btn btn-primary">Добавить</button>
    </form>
</div>

<!-- Unmapped section (usually empty) -->
<div id="unmapped-section" style="display:none;">
    <h3>Несопоставленные AI-категории <span class="cat-badge" id="unmapped-count">0</span></h3>
    <p style="font-size:.8rem;color:var(--text-muted);margin-bottom:.75rem;">
        AI вернул категории не из фиксированного списка. Выберите куда их отнести.
    </p>
    <div id="unmapped-list"></div>
</div>

<!-- Edit modal -->
<div id="edit-modal" class="cat-modal" style="display:none;">
    <div class="cat-modal-content">
        <div class="cat-modal-header">
            <h3 style="margin:0;">Редактировать категорию</h3>
            <button class="btn btn-ghost" onclick="closeEditModal()" style="padding:.5rem;">&#10005;</button>
        </div>
        <form id="edit-form" style="padding:1rem;">
            <input type="hidden" id="edit-id">
            <div class="cat-form-group">
                <label>Системное имя</label>
                <input type="text" id="edit-name" class="cat-input" readonly style="opacity:.6;">
            </div>
            <div class="cat-form-group">
                <label>Отображаемое имя</label>
                <input type="text" id="edit-display" class="cat-input" required>
            </div>
            <div class="cat-form-group">
                <label>Цвет</label>
                <input type="color" id="edit-color" class="cat-color-input">
            </div>
            <div class="cat-form-group">
                <label>Описание</label>
                <textarea id="edit-desc" class="cat-input" style="height:60px;resize:vertical;"></textarea>
            </div>
            <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Отмена</button>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<style>
.cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
}
.cat-card {
    background: var(--surface, #fff);
    border: 1px solid var(--border, #e1e5e9);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .15s;
}
.cat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.cat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--cat-color, #757575);
}
.cat-card-name { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
.cat-card-display { font-size: .8rem; color: var(--text-muted); margin-bottom: 8px; }
.cat-card-count { font-size: 1.5rem; font-weight: 700; color: var(--text-color); }
.cat-card-count-label { font-size: .7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

.cat-add-section {
    background: var(--surface-hover, #f8f9fa);
    border: 1px dashed var(--border, #e1e5e9);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 2rem;
}
.cat-add-section h3 { margin: 0 0 12px; font-size: .95rem; }
.cat-add-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.cat-input {
    padding: 8px 12px; border: 1px solid var(--border, #ddd); border-radius: 5px;
    font-size: .875rem; background: var(--surface, #fff); color: var(--text-color);
}
.cat-color-input { width: 40px; height: 36px; padding: 2px; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; }
.cat-form-group { margin-bottom: 12px; }
.cat-form-group label { display: block; font-size: .8rem; font-weight: 500; margin-bottom: 4px; color: var(--text-color); }
.cat-form-group .cat-input { width: 100%; }

.cat-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--primary-color); color: white; border-radius: 12px;
    font-size: .75rem; font-weight: 700; padding: .15rem .5rem; min-width: 1.5rem;
}

.cat-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.cat-modal-content { background: var(--surface, #fff); border-radius: 8px; width: 90%; max-width: 440px; max-height: 90vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
.cat-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border, #e0e0e0); }

/* Unmapped row */
.unmapped-row {
    display: flex; align-items: center; gap: .75rem;
    padding: .6rem .75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px;
    background: var(--surface);
}
.unmapped-name { font-weight: 600; font-size: .875rem; flex: 1; }
.unmapped-usage { font-size: .75rem; color: var(--text-muted); white-space: nowrap; }
.unmapped-select { padding: .35rem .5rem; border: 1px solid var(--border); border-radius: 5px; font-size: .8rem; background: var(--surface); color: var(--text-color); }
.unmapped-apply { padding: .35rem .6rem; background: var(--success-color, #28a745); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: .8rem; }
</style>

<script>
let categories = [];
let fixedCategoryNames = [];

document.addEventListener('DOMContentLoaded', loadAll);

async function loadAll() {
    await Promise.all([loadCategories(), loadUnmapped()]);
}

// ============================================================
// Categories
// ============================================================
async function loadCategories() {
    try {
        const r = await fetch('/api/v1/categories/');
        const data = await r.json();
        categories = data.categories || data || [];
        fixedCategoryNames = categories.map(c => c.name);
        renderCategories();
    } catch (e) {
        document.getElementById('categories-grid').innerHTML =
            `<div style="color:var(--error-color);padding:1rem;">Ошибка: ${e.message}</div>`;
    }
}

function renderCategories() {
    const grid = document.getElementById('categories-grid');
    if (!categories.length) { grid.innerHTML = '<div style="color:var(--text-muted);padding:2rem;text-align:center;">Нет категорий</div>'; return; }

    grid.innerHTML = categories.map(c => `
        <div class="cat-card" style="--cat-color:${c.color || '#757575'}" onclick="openEditModal(${c.id}, '${esc(c.name)}', '${esc(c.display_name||'')}', '${c.color||'#757575'}', '${esc(c.description||'')}')">
            <div class="cat-card-name">${esc(c.display_name || c.name)}</div>
            <div class="cat-card-display">${esc(c.name)}</div>
            <div class="cat-card-count">${c.articles_count || c.article_count || 0}</div>
            <div class="cat-card-count-label">статей</div>
        </div>
    `).join('');
}

// ============================================================
// Add category
// ============================================================
document.getElementById('add-category-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('new-cat-name').value.trim();
    const display = document.getElementById('new-cat-display').value.trim();
    const color = document.getElementById('new-cat-color').value;
    if (!name || !display) return;

    try {
        const r = await fetch('/api/v1/categories/', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, display_name: display, color})
        });
        if (!r.ok) throw new Error((await r.json()).detail || 'Ошибка');
        document.getElementById('new-cat-name').value = '';
        document.getElementById('new-cat-display').value = '';
        showAlert('Категория добавлена');
        await loadCategories();
    } catch (e) { showAlert(e.message, 'error'); }
});

// ============================================================
// Edit modal
// ============================================================
function openEditModal(id, name, display, color, desc) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-display').value = display;
    document.getElementById('edit-color').value = color;
    document.getElementById('edit-desc').value = desc;
    document.getElementById('edit-modal').style.display = 'flex';
}

function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

document.getElementById('edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    try {
        const r = await fetch('/api/v1/categories/' + id, {
            method: 'PUT', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                display_name: document.getElementById('edit-display').value.trim(),
                color: document.getElementById('edit-color').value,
                description: document.getElementById('edit-desc').value.trim()
            })
        });
        if (!r.ok) throw new Error((await r.json()).detail || 'Ошибка');
        closeEditModal();
        showAlert('Категория обновлена');
        await loadCategories();
    } catch (e) { showAlert(e.message, 'error'); }
});

// ============================================================
// Unmapped (rare — only when AI invents new category names)
// ============================================================
async function loadUnmapped() {
    try {
        const r = await fetch('/api/v1/category-mappings/unmapped?limit=50');
        const data = await r.json();
        const unmapped = data.unmapped_categories || [];
        const section = document.getElementById('unmapped-section');

        if (!unmapped.length) { section.style.display = 'none'; return; }

        section.style.display = '';
        document.getElementById('unmapped-count').textContent = unmapped.length;

        document.getElementById('unmapped-list').innerHTML = unmapped.map(u => `
            <div class="unmapped-row" id="urow-${CSS.escape(u.ai_category)}">
                <span class="unmapped-name">${esc(u.ai_category)}</span>
                <span class="unmapped-usage">${u.usage_count} ст.</span>
                <select class="unmapped-select" id="usel-${CSS.escape(u.ai_category)}">
                    ${fixedCategoryNames.map(n => `<option value="${n}" ${n === (u.suggested_fixed_category || 'Other') ? 'selected' : ''}>${n}</option>`).join('')}
                </select>
                <button class="unmapped-apply" onclick="applyMapping('${esc(u.ai_category)}')">&#10003;</button>
            </div>
        `).join('');
    } catch (e) { console.error('loadUnmapped:', e); }
}

async function applyMapping(aiCategory) {
    const sel = document.getElementById('usel-' + CSS.escape(aiCategory));
    const target = sel ? sel.value : 'Other';
    try {
        const r = await fetch('/api/v1/category-mappings', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ai_category: aiCategory, fixed_category: target, confidence_threshold: 0.7})
        });
        if (!r.ok) throw new Error((await r.json()).detail || 'Ошибка');
        const row = document.getElementById('urow-' + CSS.escape(aiCategory));
        if (row) row.remove();

        // Update count
        const remaining = document.querySelectorAll('.unmapped-row').length;
        document.getElementById('unmapped-count').textContent = remaining;
        if (!remaining) document.getElementById('unmapped-section').style.display = 'none';

        showAlert(`${aiCategory} → ${target}`);
    } catch (e) { showAlert(e.message, 'error'); }
}

// ============================================================
// Helpers
// ============================================================
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function showAlert(msg, type = 'success') {
    const colors = {success: ['#d1fae5','#065f46'], error: ['#fee2e2','#dc2626']};
    const [bg, fg] = colors[type] || colors.success;
    const el = document.createElement('div');
    el.style.cssText = `background:${bg};color:${fg};border:1px solid;padding:.6rem 1rem;border-radius:6px;font-size:.8rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;`;
    el.innerHTML = `<span>${type==='success'?'&#10003;':'&#10007;'}</span><span>${msg}</span><button onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:inherit;cursor:pointer;">&#215;</button>`;
    document.getElementById('alert-container').prepend(el);
    setTimeout(() => el.remove(), 5000);
}
</script>
{% endblock %}
