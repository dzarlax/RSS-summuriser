<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Evening News{% endblock %}</title>
    <link href="/static/css/main.css" rel="stylesheet">
    <style>
    /* Dark mode overrides + public-only styles */
    [dark-mode] {
        --bg: #1A1D21; --surface: #22252A; --surface-2: #2A2D32;
        --text: #F5F5F5; --text-secondary: rgba(245,245,245,0.7); --text-tertiary: rgba(245,245,245,0.5);
        --accent: #F5F5F5; --accent-hover: #E0E0E0;
        --border: rgba(255,255,255,0.08); --border-color: rgba(255,255,255,0.08);
        --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.2);
        --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
        --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
        --background-color: #1A1D21; --surface-color: #22252A; --surface-hover: #2A2D32;
        --text-color: #F5F5F5; --text-muted: rgba(245,245,245,0.7); --text-light: rgba(245,245,245,0.5);
        --primary-color: #F5F5F5; --primary-dark: #E0E0E0;
    }
    .theme-toggle {
        background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
        padding: 6px 10px; cursor: pointer; font-size: 1rem; line-height: 1;
        color: var(--text-secondary); transition: all var(--transition);
    }
    .theme-toggle:hover { background: var(--surface-2); color: var(--text); }
    .footer { border-top: 1px solid var(--border); padding: 32px 0; margin-top: 60px; }
    .footer-content {
        max-width: 1200px; margin: 0 auto; padding: 0 24px;
        text-align: center; color: var(--text-tertiary); font-size: 0.85rem;
    }
    </style>
    <script src="/static/js/main.js"></script>
    {% if config.ga_measurement_id %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ config.ga_measurement_id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ config.ga_measurement_id }}');
    </script>
    {% endif %}
    {% block extra_css %}{% endblock %}
    <script>
    // Apply saved theme before paint
    (function(){
        var s = localStorage.getItem('theme');
        if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches))
            document.documentElement.setAttribute('dark-mode', '');
    })();
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand"><a href="/">Evening News</a></div>
            <div class="nav-menu">
                <a href="/">Новости</a>
                <a href="/search">Поиск</a>
                <button class="theme-toggle" onclick="toggleTheme()" title="Переключить тему">
                    <span class="theme-icon">☀️</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Evening News</p>
        </div>
    </footer>

    <script>
    function toggleTheme(){
        var d = document.documentElement;
        if (d.hasAttribute('dark-mode')) { d.removeAttribute('dark-mode'); localStorage.setItem('theme','light'); }
        else { d.setAttribute('dark-mode',''); localStorage.setItem('theme','dark'); }
        updateThemeIcon();
    }
    function updateThemeIcon(){
        var dark = document.documentElement.hasAttribute('dark-mode');
        document.querySelectorAll('.theme-icon').forEach(function(el){ el.textContent = dark ? '🌙' : '☀️'; });
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcon);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
