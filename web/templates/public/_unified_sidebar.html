<!-- Desktop Sidebar -->
<aside class="unified-sidebar" id="unified-sidebar">
    <div class="sidebar-section">
        <h3 class="sidebar-heading">Категории</h3>
        <div class="sidebar-list" id="cat-list"></div>
    </div>
    <div class="sidebar-section">
        <h3 class="sidebar-heading">Источники</h3>
        <div class="sidebar-list" id="source-list"></div>
    </div>
</aside>

<!-- Mobile: Categories Sheet -->
<div id="cat-sheet" class="cat-sheet" aria-hidden="true">
    <div class="cat-sheet-content">
        <div class="cat-sheet-header">
            <h3>Категории</h3>
            <button class="btn-close-sheet" onclick="closeCatSheet()">&times;</button>
        </div>
        <div class="cat-sheet-list" id="cat-list-mobile"></div>
    </div>
</div>

<!-- Mobile: Sources Sheet -->
<div id="source-sheet" class="source-sheet" aria-hidden="true">
    <div class="source-sheet-content">
        <div class="source-sheet-header">
            <h3>Источники</h3>
            <button class="btn-close-sheet" onclick="closeSourceSheet()">&times;</button>
        </div>
        <div class="source-sheet-list" id="source-list-mobile"></div>
    </div>
</div>
