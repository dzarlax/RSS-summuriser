version: '3.8'

services:
  # News Aggregator Web Application
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: news_aggregator_web
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=mysql+aiomysql://newsuser:${DB_PASSWORD:-newspass123}@mariadb:3306/newsdb
      
      # AI/API Configuration (обязательные для работы) - ЗАМЕНИТЕ НА ВАШИ ЗНАЧЕНИЯ
      # Google Gemini API
      - GEMINI_API_KEY=your_gemini_api_key_here
      - GEMINI_API_ENDPOINT=https://generativelanguage.googleapis.com/v1/models
      - RPS=${RPS:-3}
      
      # AI Models Configuration (Gemini)
      - SUMMARIZATION_MODEL=gemini-3-flash-preview
      - CATEGORIZATION_MODEL=gemini-3-flash-preview
      - DIGEST_MODEL=gemini-3-flash-preview
      
      # Telegram Integration (обязательные) - ЗАМЕНИТЕ НА ВАШИ ЗНАЧЕНИЯ
      - TELEGRAM_TOKEN=1234567890:AAExxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - TELEGRAM_CHAT_ID=123456789             # основной канал — дайджесты с новостями
      - TELEGRAM_SERVICE_CHAT_ID=              # сервисный канал — ошибки и алерты (если пусто — используется TELEGRAM_CHAT_ID)
      - TELEGRAPH_ACCESS_TOKEN=your_telegraph_token_here
      
      # Application Settings
      - LOG_LEVEL=INFO
      - DEVELOPMENT=false
      - MAX_WORKERS=5
      - CACHE_TTL=86400
      - CACHE_DIR=/app/cache

      # Scheduler settings (optional)
      - SCHEDULER_CHECK_INTERVAL_SECONDS=60
      - SCHEDULER_RESET_EVERY_CHECKS=10
      - SCHEDULER_STUCK_HOURS=4
      - SCHEDULER_TASK_TIMEOUT_SECONDS=0
      
      # Admin Authentication (ОБЯЗАТЕЛЬНО УСТАНОВИТЕ!)
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=your_secure_admin_password_here
      - JWT_SECRET=your_jwt_secret_here
      
      # Database password (for backup operations)
      - DB_PASSWORD=${DB_PASSWORD:-newspass123}

      # CORS / trusted hosts
      - ALLOWED_ORIGINS=https://your-domain.com,http://localhost:8000
      - TRUSTED_HOSTS=your-domain.com,localhost,127.0.0.1

      # Playwright remote browser (see browser service below)
      - BROWSER_WS_ENDPOINT=ws://browser:3000/playwright

      # Database init (allow create_all for fresh installs; set false in prod)
      - ALLOW_CREATE_ALL=true
      
      # Article categories configuration
      - NEWS_CATEGORIES=Business,Tech,Science,Nature,Serbia,Marketing,Other,Media
      - DEFAULT_CATEGORY=Other
    
    depends_on:
      mariadb:
        condition: service_healthy
      browser:
        condition: service_healthy
    
    volumes:
      - ./backups:/app/backups
      - ./scripts:/app/scripts
      - app_cache:/app/cache
      - app_logs:/app/logs
    
    networks:
      - news_network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MariaDB Database
  mariadb:
    image: mariadb:11
    container_name: news_aggregator_db
    environment:
      MARIADB_DATABASE: newsdb
      MARIADB_USER: newsuser
      MARIADB_PASSWORD: newspass123
      MARIADB_ROOT_PASSWORD: rootpass123

    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backups/mariadb:/backup

    ports:
      - "3306:3306"

    networks:
      - news_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # Playwright browser server — приложение подключается к нему по WebSocket
  browser:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    command: ["npx", "playwright", "run-server", "--port", "3000", "--host", "0.0.0.0", "--path", "/playwright"]
    networks:
      - news_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# Named Volumes для персистентного хранения данных
volumes:
  mariadb_data:
    driver: local
  app_cache:
    driver: local
  app_logs:
    driver: local

# Networks
networks:
  news_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==========================================
# ИНСТРУКЦИИ ПО ИСПОЛЬЗОВАНИЮ:
# ==========================================
#
# 1. ЗАПУСК:
#    docker-compose -f docker-compose.example.yml up -d
#
# 2. ЛОГИ И СТАТУС:
#    docker-compose -f docker-compose.example.yml logs -f web
#    docker-compose -f docker-compose.example.yml ps
#
# 3. ОСТАНОВКА:
#    docker-compose -f docker-compose.example.yml down
#
# 4. ДОСТУП К ПРИЛОЖЕНИЮ:
#    - Главная страница (новости): http://localhost:8000
#    - Админ-панель: http://localhost:8000/admin (требует пароль)
#    - API документация: http://localhost:8000/docs
#    - База данных: localhost:3306 (newsuser/newspass123)
#
# ВАЖНО: Перед запуском замените:
# - GEMINI_API_KEY на ваш реальный ключ API Google Gemini
# - TELEGRAM_TOKEN на токен вашего бота
# - TELEGRAM_CHAT_ID на ID основного канала (дайджесты)
# - TELEGRAM_SERVICE_CHAT_ID на ID сервисного канала (ошибки/алерты, опционально)
# - ADMIN_PASSWORD на надежный пароль для админки
# - TELEGRAPH_ACCESS_TOKEN на ваш Telegraph токен (опционально)
